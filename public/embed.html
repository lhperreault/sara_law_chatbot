<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roque Law Firm Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff; display: flex; flex-direction: column;
  }

  #embed-header {
    background: #1e3a5f; color: #fff;
    padding: 10px 18px; display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .embed-header-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  #embed-header h4 { margin: 0; font-size: 15px; font-weight: 600; }
  #embed-header p { margin: 0; font-size: 12px; opacity: 0.85; }

  /* Pre-chat form */
  #embed-prechat {
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 24px; background: #f8fafc;
    border-bottom: 1px solid #e2e8f0; gap: 12px;
  }
  #embed-prechat h3 { margin: 0; font-size: 20px; font-weight: 700; color: #1e293b; }
  #embed-prechat p { margin: 0; font-size: 14px; color: #64748b; text-align: center; }
  #embed-prechat input {
    width: 100%; max-width: 360px; padding: 10px 12px;
    border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 14px; font-family: inherit; outline: none;
  }
  #embed-prechat input:focus { border-color: #1e3a5f; }
  #embed-prechat-submit {
    width: 100%; max-width: 360px;
    background: #1e3a5f; color: #fff; border: none;
    border-radius: 8px; padding: 10px; font-size: 14px;
    cursor: pointer; font-family: inherit; font-weight: 600;
  }
  #embed-prechat-submit:hover { opacity: 0.9; }
  #embed-prechat-submit:disabled { opacity: 0.5; }
  #embed-prechat.hidden { display: none; }

  /* Messages */
  #embed-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    background: #f8fafc;
  }
  #embed-messages::-webkit-scrollbar { width: 4px; }
  #embed-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

  .law-msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    align-self: flex-start; max-width: 88%;
  }
  .law-msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: #1e3a5f; color: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .law-msg {
    padding: 10px 14px; border-radius: 14px; font-size: 14px;
    line-height: 1.5; word-break: break-word; white-space: pre-wrap;
  }
  .law-msg-bot {
    background: #fff; color: #1e293b;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .law-msg-user {
    background: #1e3a5f; color: #fff;
    border-bottom-right-radius: 4px;
    align-self: flex-end; max-width: 82%;
  }

  .law-suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-self: flex-start; padding-left: 36px;
  }
  .law-suggestion-btn {
    background: #fff; color: #64748b; border: 1.5px solid #cbd5e1;
    border-radius: 20px; padding: 6px 14px; font-size: 13px;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .law-suggestion-btn:hover {
    background: #f1f5f9; color: #1e293b; border-color: #94a3b8;
  }

  .law-typing-row { display: flex; align-items: flex-end; gap: 8px; align-self: flex-start; }
  .law-typing {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px; background: #fff;
    border-radius: 14px; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .law-typing span {
    width: 7px; height: 7px; background: #94a3b8;
    border-radius: 50%; animation: law-bounce 1.2s infinite;
  }
  .law-typing span:nth-child(2) { animation-delay: 0.2s; }
  .law-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes law-bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  #embed-input-row {
    display: flex; gap: 8px; padding: 12px;
    background: #fff; border-top: 1px solid #e2e8f0; flex-shrink: 0;
  }
  #embed-input-row.hidden { display: none; }
  #embed-input {
    flex: 1; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 9px 13px; font-size: 16px; outline: none;
    resize: none; font-family: inherit; line-height: 1.4;
    max-height: 90px; overflow-y: auto;
  }
  #embed-input:focus { border-color: #1e3a5f; }
  #embed-send {
    background: #1e3a5f; color: #fff; border: none;
    border-radius: 10px; padding: 0 14px;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
  }
  #embed-send:disabled { opacity: 0.5; cursor: not-allowed; }

  #embed-footer {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 4px 0 8px; background: #fff; flex-shrink: 0;
    font-size: 11px; color: #94a3b8;
  }
  #embed-reset {
    background: none; border: none; color: #cbd5e1;
    font-size: 13px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  #embed-reset:hover { color: #94a3b8; }
  #embed-reset-confirm {
    display: none; font-size: 11px; color: #ef4444;
    cursor: pointer; background: none; border: none;
    font-family: inherit; padding: 0 4px;
  }
  #embed-reset-confirm:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="embed-header">
  <div class="embed-header-icon">&#9878;&#65039;</div>
  <div>
    <h4>Roque Law Firm</h4>
    <p>Online - usually replies instantly</p>
  </div>
</div>

<div id="embed-prechat">
  <h3>Welcome to Roque Law Firm</h3>
  <p>Let's get started. What's your first name?</p>
  <input type="text" id="embed-prechat-name" placeholder="First name *" autocomplete="given-name" required>
  <button id="embed-prechat-submit">Start Chat</button>
</div>

<div id="embed-messages"></div>

<div id="embed-input-row" class="hidden">
  <textarea id="embed-input" rows="1" placeholder="Type a message..."></textarea>
  <button id="embed-send" aria-label="Send">&#10148;</button>
</div>

<div id="embed-footer">
  <span>Powered by AI Legal Assistant</span>
  <button id="embed-reset" title="Reset chat">&#8635;</button>
  <button id="embed-reset-confirm">Reset chat?</button>
</div>

<script>
(function () {
  const API_URL = "/api/chat";
  const LOOKUP_URL = "/api/clients/lookup";
  const STORAGE_KEY = "law-embed-session";
  const PRACTICE_AREA = "roque_law";
  const FIRST_SUGGESTIONS = ["Personal Injury", "Criminal Defense"];
  function buildGreeting(firstName) {
    return "Hi " + firstName + ", thanks for reaching out to Roque Law Firm. Are you looking for help with a personal injury or a criminal defense matter?";
  }

  const messages = [];
  let isWaiting = false;
  let clientInfo = null;
  let conversationId = null;
  let identified = false;

  const prechatEl = document.getElementById("embed-prechat");
  const nameInput = document.getElementById("embed-prechat-name");
  const prechatSubmit = document.getElementById("embed-prechat-submit");
  const messagesEl = document.getElementById("embed-messages");
  const inputRow = document.getElementById("embed-input-row");
  const inputEl = document.getElementById("embed-input");
  const sendBtn = document.getElementById("embed-send");
  const resetBtn = document.getElementById("embed-reset");
  const resetConfirm = document.getElementById("embed-reset-confirm");

  function saveSession() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, clientInfo, conversationId, identified, ts: Date.now() })); } catch {}
  }
  function loadSession() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (new Date(data.ts).toDateString() !== new Date().toDateString()) {
        localStorage.removeItem(STORAGE_KEY); return null;
      }
      return data;
    } catch { return null; }
  }
  function clearSession() { try { localStorage.removeItem(STORAGE_KEY); } catch {} }

  function showChatUI() {
    prechatEl.classList.add("hidden");
    inputRow.classList.remove("hidden");
  }

  function addMessage(role, text) {
    if (role === "user") {
      const div = document.createElement("div");
      div.className = "law-msg law-msg-user";
      div.textContent = text;
      messagesEl.appendChild(div);
    } else {
      const row = document.createElement("div");
      row.className = "law-msg-row";
      row.innerHTML = '<div class="law-msg-avatar">AI</div>';
      const b = document.createElement("div");
      b.className = "law-msg law-msg-bot";
      b.textContent = text;
      row.appendChild(b);
      messagesEl.appendChild(row);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSuggestions(options) {
    if (!options || !options.length) return;
    const c = document.createElement("div");
    c.className = "law-suggestions";
    options.forEach(function (opt) {
      const btn = document.createElement("button");
      btn.className = "law-suggestion-btn";
      btn.textContent = opt;
      btn.addEventListener("click", function () { c.remove(); sendMessage(opt); });
      c.appendChild(btn);
    });
    messagesEl.appendChild(c);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "law-typing-row"; row.id = "law-typing-indicator";
    row.innerHTML = '<div class="law-msg-avatar">AI</div><div class="law-typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() { var el = document.getElementById("law-typing-indicator"); if (el) el.remove(); }

  async function handlePrechat() {
    const firstName = nameInput.value.trim();
    if (!firstName) { nameInput.focus(); return; }
    const syntheticEmail = "chat_" + Date.now() + "_" + Math.random().toString(36).slice(2,8) + "@roque-chat.local";
    prechatSubmit.disabled = true;
    prechatSubmit.textContent = "Connecting...";
    try {
      const res = await fetch(LOOKUP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: syntheticEmail, first_name: firstName, channel: "website" }),
      });
      const data = await res.json();
      clientInfo = data.client;
      conversationId = data.conversation_id;
      identified = true;
      showChatUI();
      const greeting = buildGreeting(firstName);
      addMessage("bot", greeting);
      messages.push({ role: "assistant", content: greeting });
      addSuggestions(FIRST_SUGGESTIONS);
      saveSession();
    } catch (err) {
      addMessage("bot", "Sorry, couldn't connect. Please try again.");
      prechatSubmit.disabled = false;
      prechatSubmit.textContent = "Start Chat";
    }
  }

  prechatSubmit.addEventListener("click", handlePrechat);
  nameInput.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); handlePrechat(); } });

  async function sendMessage(text) {
    if (!text.trim() || isWaiting || !identified) return;
    messagesEl.querySelectorAll(".law-suggestions").forEach(function (el) { el.remove(); });
    addMessage("user", text.trim());
    messages.push({ role: "user", content: text.trim() });
    saveSession();
    inputEl.value = ""; inputEl.style.height = "auto";
    isWaiting = true; sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ conversation_id: conversationId, client_email: clientInfo.email, message: text.trim(), practice_area: PRACTICE_AREA }),
      });
      const data = await res.json();
      hideTyping();
      if (data.conversation_id) conversationId = data.conversation_id;
      var reply = data.reply || "Sorry, something went wrong.";
      addMessage("bot", reply);
      messages.push({ role: "assistant", content: reply });
      saveSession();
      if (data.suggestions) addSuggestions(data.suggestions);
    } catch (e) {
      hideTyping();
      addMessage("bot", "Sorry, couldn't connect. Please try again.");
    }
    isWaiting = false; sendBtn.disabled = false; inputEl.focus();
  }

  function restoreSession(saved) {
    clientInfo = saved.clientInfo; conversationId = saved.conversationId; identified = saved.identified;
    if (identified) showChatUI();
    if (saved.messages) saved.messages.forEach(function (msg) { messages.push(msg); addMessage(msg.role === "user" ? "user" : "bot", msg.content); });
  }

  function resetChat() {
    messages.length = 0; messagesEl.innerHTML = "";
    clientInfo = null; conversationId = null; identified = false;
    clearSession();
    resetConfirm.style.display = "none"; resetBtn.style.display = "";
    prechatEl.classList.remove("hidden"); inputRow.classList.add("hidden");
    nameInput.value = "";
    prechatSubmit.disabled = false; prechatSubmit.textContent = "Start Chat";
  }

  resetBtn.addEventListener("click", function () {
    resetBtn.style.display = "none"; resetConfirm.style.display = "inline";
    setTimeout(function () { resetConfirm.style.display = "none"; resetBtn.style.display = ""; }, 3000);
  });
  resetConfirm.addEventListener("click", resetChat);
  sendBtn.addEventListener("click", function () { sendMessage(inputEl.value); });
  inputEl.addEventListener("keydown", function (e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); } });
  inputEl.addEventListener("input", function () { inputEl.style.height = "auto"; inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + "px"; });

  // Init
  var saved = loadSession();
  if (saved && saved.identified) { restoreSession(saved); }
})();
</script>
</body>
</html>
